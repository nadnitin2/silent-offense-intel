name: SilentOffense Threat Intelligence Aggregator

on:
  schedule:
    # Triggers at minute 15 of every hour to seamlessly ingest node telemetry
    - cron: '15 * * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" from GitHub UI

jobs:
  aggregate-threats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4.2.2

      - name: Setup Standardized Python Environment
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'

      - name: Execute Deduplication and Incremental Ingestion
        run: python .github/scripts/aggregate.py

      - name: Commit Validated Dynamic Intelligence Delta
        run: |
          git config --global user.name "SilentOffense-Bot"
          git config --global user.email "bot@silentoffense.local"
          git add output/master_blacklist.txt
          
          # Commit updates strictly if new unique threat vectors were extracted
          if ! git diff --cached --quiet; then
            git commit -m "Automated Sync: Filtered and appended new unique vectors [Skip CI]"
            git push
          else
            echo "Zero intelligence delta detected. Skipping push infrastructure matrix."
          fi
