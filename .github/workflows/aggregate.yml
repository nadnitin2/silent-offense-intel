name: Automated Threat Intelligence Aggregator Pipeline

on:
  repository_dispatch:
    types: [node_telemetry_sync]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Components
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ingest Remote Telemetry Payload
        run: |
          mkdir -p nodes output
          NODE="${{ github.event.client_payload.node_name }}"
          
          # If triggered by server webhook, rewrite the file in the exact expected structure
          if [ -n "$NODE" ]; then
            echo "[INFO] Syncing architecture payload for node: $NODE"
            cat <<EOF > "nodes/${NODE}_threats.json"
          {
            "node_identity": "$NODE",
            "aggregated_dropped_packets": ${{ github.event.client_payload.node_metrics.dropped_packets }},
            "intelligence": {
              "police_blacklist": {
                "ip_count": ${{ github.event.client_payload.node_metrics.local_pool_size }},
                "packets_dropped": ${{ github.event.client_payload.node_metrics.dropped_packets }},
                "bytes_dropped": "${{ github.event.client_payload.node_metrics.dropped_bytes }}",
                "members": []
              }
            }
          }
          EOF
          fi

      - name: Execute Native Aggregator Script
        run: |
          if [ -f ".github/scripts/aggregate.py" ]; then
            python .github/scripts/aggregate.py
          else
            echo "[ERROR] Main pipeline processor aggregate.py not found!"
            exit 1
          fi

      - name: Commit and Push Compiled Assets back to Repository
        run: |
          git config --global user.name "SilentOffense-Bot"
          git config --global user.email "bot@silentoffense.local"
          git add nodes/*.json output/*.json output/*.txt
          
          if ! git diff --cached --quiet; then
            git commit -m "Automated Sync: Multi-node metrics dashboard and blacklist updated [Skip CI]"
            git push origin main
          else
            echo "[INFO] Dynamic vectors match state repository. Skipping operational push execution."
          fi
