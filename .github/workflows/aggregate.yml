name: Automated Threat Intelligence Aggregator Pipeline

on:
  repository_dispatch:
    types: [node_telemetry_sync]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Components
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ingest Remote Telemetry Payload Safely
        run: |
          mkdir -p nodes output
          
          NODE="${{ github.event.client_payload.node_name }}"
          SYNC_TIME="${{ github.event.client_payload.last_sync_utc }}"
          PKTS="${{ github.event.client_payload.node_metrics.dropped_packets }}"
          BYTES="${{ github.event.client_payload.node_metrics.dropped_bytes }}"
          POOL="${{ github.event.client_payload.node_metrics.local_pool_size }}"
          
          if [ -n "$NODE" ]; then
            echo "[INFO] Commencing payload stream injection for node: $NODE"
            cat <<EOF > "nodes/${NODE}_threats.json"
          {
              "node_name": "$NODE",
              "last_sync_utc": "$SYNC_TIME",
              "node_metrics": {
                  "dropped_packets": ${PKTS:-0},
                  "dropped_bytes": ${BYTES:-0},
                  "local_pool_size": ${POOL:-0}
              },
              "intelligence": {
                  "combined_unique_members": []
              }
          }
          EOF
          fi

      - name: Execute Native Aggregator Script
        run: |
          if [ -f ".github/scripts/aggregate.py" ]; then
            python .github/scripts/aggregate.py
          else
            echo "[ERROR] Pipeline logic fault: aggregate.py script instance is missing!"
            exit 1
          fi

      - name: Secure Push Verified Ingestion Assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Sync: Multi-node metrics dashboard and blacklist updated [Skip CI]"
          branch: main
          file_pattern: 'nodes/*.json output/*.json output/*.txt'
          commit_user_name: "SilentOffense-Bot"
          commit_user_email: "bot@silentoffense.local"
