name: Automated Threat Intelligence Aggregator Pipeline

on:
  repository_dispatch:
    types: [node_telemetry_sync]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Components
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Process Ingested Payload Safely
        run: |
          mkdir -p nodes output
          
          NODE="${{ github.event.client_payload.node_name }}"
          
          # Only create/update file if payload contains actual unique elements array
          if [ -n "$NODE" ]; then
            echo "[INFO] Commencing payload stream injection for node: $NODE"
            echo '${{ toJson(github.event.client_payload) }}' > "nodes/${NODE}_threats.json"
          fi

      - name: Execute Native Aggregator Script
        run: |
          if [ -f ".github/scripts/aggregate.py" ]; then
            python .github/scripts/aggregate.py
          else
            echo "[ERROR] Pipeline logic fault: aggregate.py script instance is missing!"
            exit 1
          fi

      - name: Commit and Push Compiled Assets back to Repository
        run: |
          git config --global user.name "SilentOffense-Bot"
          git config --global user.email "bot@silentoffense.local"
          
          git fetch origin main
          git checkout origin/main -- output/dashboard_metrics.json output/master_blacklist.txt output/blacklist.txt || true
          
          git add nodes/*.json output/*.json output/*.txt
          
          if ! git diff --cached --quiet; then
            git commit -m "Automated Sync: Multi-node metrics dashboard and blacklist updated [Skip CI]"
            
            for i in {1..3}; do
              git pull --strategy-option=theirs --no-rebase origin main && git push origin main && break
              sleep 2
            done
          else
            echo "[INFO] Telemetry matrix aligns with current state. Skipping operations deployment."
          fi
